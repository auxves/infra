name: dns

on:
  push:
    branches:
      - "**"
      - "!renovate/**"
      - "renovate/lock-file-maintenance"

jobs:
  update-records:
    runs-on: ubuntu-latest
    environment: Production
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@131015bad844610e5e6300f8a143bf625d3e74f4 # v3.17.0

      - name: Update DNS Records
        env:
          CF_DNS_API_TOKEN: ${{ secrets.CF_DNS_API_TOKEN }}
        run: nix run .#scripts.deploy-dns -- --doit

  dry-run:
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/main'

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@131015bad844610e5e6300f8a143bf625d3e74f4 # v3.17.0

      - name: Dry Update DNS Records
        env:
          CF_DNS_API_TOKEN: ${{ secrets.CF_DNS_API_TOKEN_RO }}
        run: nix run .#scripts.deploy-dns
